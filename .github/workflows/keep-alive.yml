name: Keep Hugging Face Space Awake

on:
  schedule:
    # Runs every 30 minutes to prevent both FastAPI and the Serverless LLM from cold-starting
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint and Warm Up LLM
        run: curl -f "https://raghav-1729-diablo-ai-agent.hf.space/health?ping_llm=true" || echo "Ping failed but workflow will succeed"
