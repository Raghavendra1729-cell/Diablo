embedding:
  model: "BAAI/bge-small-en-v1.5"
  device: "cpu"                 

chunking:
  chunk_size: 1000                    
  overlap: 200                      

vectordb:
  collection: "sc_portfolio_gpu"
  distance: "cosine"
  score_threshold: 0.45              

retrieval:
  top_k: 10                       

llm:
  model: "meta-llama/Llama-3.3-70B-Instruct"
  provider: "huggingface"
  base_url: "https://router.huggingface.co/hf-inference/v1"
  max_tokens: 1500         # was 4096 — 63% cheaper, still plenty for full answers
  max_tokens_voice: 400    # voice must be short; 400 covers long tool-result synthesis
  temperature: 0.3
  temperature_voice: 0.5
  top_p: 0.9
  max_search_turns: 3      # max LLM tool-call loops per request
  history_limit: 10        # max history messages sent per request (prevents growing context cost)

calendar:
  provider: "calcom"                 
  calcom_base_url: "https://api.cal.com/v2"

persona:
  name: "Linga Seetha Rama Raghavendra's AI Representative"
  data_dir: "data"

server:
  host: "0.0.0.0"
  port: 8000
